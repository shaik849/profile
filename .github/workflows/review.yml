name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Send diff to AI
        id: review
        run: |
          DIFF=$(cat diff.txt | sed 's/"/\\"/g')

          RESPONSE=$(curl -s -X POST https://assumed-titanium-lovers-finally.trycloudflare.com/api/review \
            -H "Content-Type: application/json" \
            -d "{\"diff\":\"$DIFF\"}")

          echo "$RESPONSE" > result.json

      # ✅ ADD COMMENT STEP HERE (before fail)
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('result.json', 'utf8'));

            const body = `
🤖 AI Code Review

**Status:** ${result.status}

**Summary:**
${result.summary}

**Changes:**
${(result.changes || []).join("\n")}

**Issues:**
${(result.issues || []).join("\n")}

**Suggestions:**
${(result.suggestions || [])
  .map(s => `- ${s.file}:${s.line} → ${s.message}`)
  .join("\n")}
            `;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            });

      # ✅ FAIL AFTER COMMENT
      - name: Fail if BLOCKED
        run: |
          STATUS=$(cat result.json | jq -r '.status')

          echo "Status: $STATUS"

          if [ "$STATUS" = "BLOCKED" ]; then
            echo "❌ PR Blocked by AI Review"
            exit 1
          fi