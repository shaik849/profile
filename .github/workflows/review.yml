name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Send diff to AI
        id: review
        run: |
          DIFF=$(cat diff.txt | sed 's/"/\\"/g')

          RESPONSE=$(curl -L -s -X POST https://assumed-titanium-lovers-finally.trycloudflare.com/api/review \
            -H "Content-Type: application/json" \
            -d "{\"diff\":\"$DIFF\"}")

          echo "$RESPONSE" > result.json

      # 🔍 DEBUG (very important)
      - name: Debug API response
        run: |
          echo "===== RAW RESPONSE ====="
          cat result.json

      - name: Comment on PR (safe)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('result.json', 'utf8');

            let result;

            try {
              result = JSON.parse(raw);
            } catch (e) {
              result = {
                status: "ERROR",
                summary: "Invalid JSON from API",
                raw: raw.substring(0, 500)
              };
            }

            const body =
              "AI Code Review\n\n" +
              "**Status:** " + result.status + "\n\n" +
              "**Summary:**\n" + (result.summary || "N/A") + "\n\n" +
              "**Changes:**\n" + (result.changes || []).join("\n") + "\n\n" +
              "**Issues:**\n" + (result.issues || []).join("\n") + "\n\n" +
              "**Suggestions:**\n" +
              (result.suggestions || [])
                .map(s => "- " + s.file + ":" + s.line + " -> " + s.message)
                .join("\n") +
              "\n\n---\n**Debug (raw response):**\n```\n" +
              (result.raw || "") +
              "\n```";

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail if BLOCKED
        run: |
          STATUS=$(node -e "
            try {
              const r = require('./result.json');
              console.log(r.status || 'ERROR');
            } catch(e) {
              console.log('ERROR');
            }
          ")

          echo "Status: $STATUS"

          if [ "$STATUS" = "BLOCKED" ]; then
            echo "❌ PR Blocked by AI Review"
            exit 1
          fi
